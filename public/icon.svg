<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#1e1b3a"/>
  <!-- Card shape -->
  <rect x="96" y="72" width="320" height="368" rx="28" fill="#f0f0f5"/>
  <rect x="96" y="72" width="320" height="368" rx="28" fill="none" stroke="#c8c5e8" stroke-width="3"/>
  <!-- Top-left suit + value -->
  <text x="126" y="148" font-family="Georgia,serif" font-size="72" font-weight="bold" fill="#1e1b3a">K</text>
  <text x="127" y="198" font-family="serif" font-size="52" fill="#1e1b3a">♠</text>
  <!-- Center spade -->
  <text x="256" y="330" text-anchor="middle" font-family="serif" font-size="178" fill="#1e1b3a">♠</text>
  <!-- Bottom-right (rotated) -->
  <text x="386" y="366" font-family="Georgia,serif" font-size="72" font-weight="bold" fill="#1e1b3a" text-anchor="middle" transform="rotate(180 386 340)">K</text>
  <text x="385" y="318" font-family="serif" font-size="52" fill="#1e1b3a" text-anchor="middle" transform="rotate(180 385 292)">♠</text>
</svg>
